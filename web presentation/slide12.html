<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>12. Спасибо за внимание!</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .thank-you-slide {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        height: 100%;
      }

      .thank-you-content {
        display: flex;
        align-items: center;
        gap: 60px;
        background: var(--card-bg);
        padding: 60px 80px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .thank-you-text h1 {
        font-size: 3.5rem;
        color: var(--accent-blue);
        margin-bottom: 15px;
        animation: bounce 1.5s infinite;
        border: none;
      }

      .thank-you-text p {
        font-size: 1.3rem;
        color: var(--text-muted);
        margin-bottom: 30px;
      }

      .contact-info {
        font-size: 1.1rem;
        text-align: left;
      }
      .contact-info a {
        color: var(--accent-green);
        text-decoration: none;
      }
      .contact-info a:hover {
        text-decoration: underline;
      }
      .qr-code-container {
        text-align: center;
      }
      .qr-code-container img {
        width: 250px;
        height: 250px;
        border-radius: 12px;
        border: 4px solid var(--border-color);
      }
      .qr-code-container p {
        margin-top: 15px;
        color: var(--accent-gold);
        font-family: "Fira Code", monospace;
      }
    </style>
  </head>
  <body>
    <div class="thank-you-content">
      <div class="thank-you-text">
        <h1>Спасибо за внимание!</h1>

        <div class="contact-info">
          <p>
            <strong>Выполнила </strong>
            Команда 2 курса КФ МГТУ им. Н.Э. Баумана:
            <strong>Hot_code_band</strong>
          </p>
          <p>
            <strong>GitHub:</strong>
            <a href="https://github.com/Maxim-5GHZ/KampBase.git"
              >https://github.com/Maxim-5GHZ/KampBase.git</a
            >
          </p>
        </div>
      </div>

      <div class="qr-code-container">
        <img src="src/teamlogo.png" />
      </div>
    </div>

    <div class="navigation">
      <a href="slide11.html" class="nav-btn">◀ Назад</a>
      <a href="index.html" class="nav-btn">На главную</a>
    </div>
  </body>
</html>
