# JWT Configuration
hack.app.jwtSecret=${HACK_APP_JWT_SECRET:yourSecureSecretKeyMustBeLongEnoughForHS256Algorithm}
hack.app.jwtExpirationMs=${HACK_APP_JWT_EXPIRATION_MS:86400000}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://mariadb:3306/kampbase}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.org.springframework.security=DEBUG
server.servlet.session.tracking-modes=cookie
# Папка для сохранения файлов (создастся в корне проекта)
file.upload-dir=uploads

# Максимальный размер файла (по умолчанию Spring разрешает только 1MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
